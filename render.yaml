# ─────────────────────────────────────────────────────────────────────────────
#  render.yaml  —  Render Blueprint for one-click backend deploy
#  Docs: https://docs.render.com/blueprint-spec
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: quote-agents-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: main
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false            # prompts you to enter the value on first deploy
      - key: FRONTEND_ORIGINS
        sync: false            # set to your Vercel URL after frontend deploys
      - key: PORT
        value: 8001
